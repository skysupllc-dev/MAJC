<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">
<title>MAJC — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0f1a;
    color: #e2e8f0;
    font-family: 'Barlow', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── card container ── */
  .card {
    width: 100%;
    max-width: 400px;
    padding: 40px 32px 36px;
    background: #111827;
    border: 1px solid rgba(148,163,184,0.15);
    border-radius: 20px;
    margin: 16px;
  }

  /* ── logo ── */
  .logo-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
    gap: 12px;
  }
  .logo-mark {
    width: 64px;
    height: 64px;
    background: #1d4ed8;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
  }
  .logo-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: #e2e8f0;
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 13px;
    color: #64748b;
    letter-spacing: 0.5px;
    margin-top: -8px;
  }

  /* ── tabs ── */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
    background: #0a0f1a;
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    padding: 9px 4px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: #64748b;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: #1d4ed8;
    color: #ffffff;
  }

  /* ── panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── form elements ── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #94a3b8;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .field input {
    width: 100%;
    background: #0a0f1a;
    border: 1px solid rgba(148,163,184,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    color: #e2e8f0;
    font-size: 15px;
    font-family: 'Barlow', sans-serif;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: #3b82f6; }
  .field input::placeholder { color: #475569; }

  /* ── buttons ── */
  .btn-primary {
    width: 100%;
    background: #1d4ed8;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:active { background: #1e40af; }

  .btn-google {
    width: 100%;
    background: #ffffff;
    color: #1e293b;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    transition: background 0.2s;
  }
  .btn-google:hover { background: #f1f5f9; }
  .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* ── divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(148,163,184,0.15);
  }
  .divider span {
    font-size: 12px;
    color: #475569;
    font-weight: 500;
  }

  /* ── error / success messages ── */
  .msg {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    display: none;
  }
  .msg.error {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
  }
  .msg.success {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.25);
    color: #4ade80;
  }
  .msg.show { display: block; }

  /* ── loading spinner inside button ── */
  .btn-primary.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  /* ── access code display ── */
  .code-box {
    background: #0a0f1a;
    border: 1px solid rgba(148,163,184,0.15);
    border-radius: 8px;
    padding: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: #64748b;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .code-box strong { color: #60a5fa; font-size: 15px; }

  /* ── footer note ── */
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #475569;
    margin-top: 20px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-row">
    <div class="logo-mark">MJ</div>
    <div>
      <div class="logo-name">MAJC</div>
      <div class="logo-sub">Fleet Back Office</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Log In</button>
    <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    <button class="tab-btn" onclick="switchTab('join')">Join Team</button>
  </div>

  <!-- ── LOG IN PANEL ── -->
  <div id="panel-login" class="panel active">
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <div class="divider"><span>or sign in with email</span></div>
    <div id="msg-login" class="msg error"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="btn-login" onclick="signInEmail()">Log In →</button>
  </div>

  <!-- ── SIGN UP PANEL ── -->
  <div id="panel-signup" class="panel">
    <div id="msg-signup" class="msg error"></div>
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="signup-name" placeholder="e.g. Sarah" autocomplete="given-name">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password <span style="color:#475569;font-weight:400">(min. 6 characters)</span></label>
      <input type="password" id="signup-password" placeholder="Create a password" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Business Name</label>
      <input type="text" id="signup-biz" placeholder="e.g. MAJC Trucking LLC">
    </div>
    <button class="btn-primary" id="btn-signup" onclick="signUpEmail()">Create Account →</button>
  </div>

  <!-- ── JOIN TEAM PANEL ── -->
  <div id="panel-join" class="panel">
    <div class="code-box">
      Ask your team owner for the <strong>Access Code</strong> for your workspace. Enter it below along with your name and email to join.
    </div>
    <div id="msg-join" class="msg error"></div>
    <div class="field">
      <label>Team Access Code</label>
      <input type="text" id="join-code" placeholder="e.g. MAJC2026" autocomplete="off" style="text-transform:uppercase;letter-spacing:2px">
    </div>
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="join-name" placeholder="e.g. Mike">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="join-email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Password <span style="color:#475569;font-weight:400">(min. 6 characters)</span></label>
      <input type="password" id="join-password" placeholder="Create a password">
    </div>
    <button class="btn-primary" id="btn-join" onclick="joinTeam()">Join Workspace →</button>
  </div>

  <div class="footer-note">
    Your data is stored securely.<br>We never sell or share it.
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged,
  updateProfile
} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

// ── Your Firebase config ──────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD95D_6kVluW8neV_T0S64T6yMML7Tsv58",
  authDomain: "majc-ec327.firebaseapp.com",
  projectId: "majc-ec327",
  storageBucket: "majc-ec327.firebasestorage.app",
  messagingSenderId: "916377285796",
  appId: "1:916377285796:web:5d60ff54ea1b6d31aa6231"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

// ── Helper: show a message ────────────────────────────────────────────────────
function showMsg(id, text, type = 'error') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}
function clearMsg(id) {
  const el = document.getElementById(id);
  el.className = 'msg';
}

// ── Helper: set button loading state ─────────────────────────────────────────
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', loading);
  btn.textContent = loading ? 'Please wait...' : btn.dataset.label;
}

// Store button labels
document.querySelectorAll('.btn-primary').forEach(btn => {
  btn.dataset.label = btn.textContent;
});

// ── Tab switching ─────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['login','signup','join'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
};

// ── If already logged in, go straight to app ─────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (user) {
    // Save user info to localStorage so app.html can read it
    localStorage.setItem('majc_user', JSON.stringify({
      uid: user.uid,
      name: user.displayName || user.email.split('@')[0],
      email: user.email
    }));
    window.location.href = 'app.html';
  }
});

// ── Log In with Email ─────────────────────────────────────────────────────────
window.signInEmail = async function() {
  clearMsg('msg-login');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showMsg('msg-login', 'Please enter your email and password.'); return; }
  setLoading('btn-login', true);
  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged above handles the redirect
  } catch (e) {
    setLoading('btn-login', false);
    const msgs = {
      'auth/user-not-found': 'No account found with that email.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
      'auth/invalid-credential': 'Email or password is incorrect.'
    };
    showMsg('msg-login', msgs[e.code] || 'Login failed. Please try again.');
  }
};

// ── Sign Up with Email ────────────────────────────────────────────────────────
window.signUpEmail = async function() {
  clearMsg('msg-signup');
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const biz = document.getElementById('signup-biz').value.trim();
  if (!name || !email || !password || !biz) { showMsg('msg-signup', 'Please fill in all fields.'); return; }
  if (password.length < 6) { showMsg('msg-signup', 'Password must be at least 6 characters.'); return; }
  setLoading('btn-signup', true);
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    // Save display name
    await updateProfile(cred.user, { displayName: name });
    // Create their workspace in Firestore using their UID as workspace ID
    const workspaceId = cred.user.uid;
    await setDoc(doc(db, 'workspaces', workspaceId), {
      bizName: biz,
      ownerName: name,
      ownerEmail: email,
      income: 0,
      incomeHistory: [],
      bills: [],
      loans: [],
      weekly: [
        { name: 'Fuel', planned: 0, actual: 0 },
        { name: 'Maintenance', planned: 0, actual: 0 },
        { name: 'Personal Pay', planned: 0, actual: 0 }
      ],
      maint: { balance: 0, weeklyAdd: 500 },
      trucks: [
        { id: 'Unit 1', name: 'Unit 1' },
        { id: 'Unit 2', name: 'Unit 2' }
      ],
      exportHistory: [],
      accessCode: workspaceId.slice(0, 8).toUpperCase(),
      createdAt: new Date().toISOString()
    });
    // Save workspace link
    localStorage.setItem('majc_workspace', JSON.stringify({
      wid: workspaceId,
      uname: name
    }));
    // onAuthStateChanged handles redirect
  } catch (e) {
    setLoading('btn-signup', false);
    const msgs = {
      'auth/email-already-in-use': 'An account with this email already exists. Try logging in.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password must be at least 6 characters.'
    };
    showMsg('msg-signup', msgs[e.code] || 'Sign up failed. Please try again.');
  }
};

// ── Sign In with Google ───────────────────────────────────────────────────────
window.signInWithGoogle = async function() {
  try {
    const result = await signInWithPopup(auth, googleProvider);
    const user = result.user;
    // Check if workspace exists for this user
    const wsDoc = await getDoc(doc(db, 'workspaces', user.uid));
    if (!wsDoc.exists()) {
      // First time Google sign in — create workspace
      await setDoc(doc(db, 'workspaces', user.uid), {
        bizName: 'My Fleet',
        ownerName: user.displayName || 'Owner',
        ownerEmail: user.email,
        income: 0,
        incomeHistory: [],
        bills: [],
        loans: [],
        weekly: [
          { name: 'Fuel', planned: 0, actual: 0 },
          { name: 'Maintenance', planned: 0, actual: 0 },
          { name: 'Personal Pay', planned: 0, actual: 0 }
        ],
        maint: { balance: 0, weeklyAdd: 500 },
        trucks: [{ id: 'Unit 1', name: 'Unit 1' }],
        exportHistory: [],
        accessCode: user.uid.slice(0, 8).toUpperCase(),
        createdAt: new Date().toISOString()
      });
    }
    localStorage.setItem('majc_workspace', JSON.stringify({
      wid: user.uid,
      uname: user.displayName || user.email.split('@')[0]
    }));
    // onAuthStateChanged handles redirect
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showMsg('msg-login', 'Google sign in failed. Please try again.');
    }
  }
};

// ── Join Team ─────────────────────────────────────────────────────────────────
window.joinTeam = async function() {
  clearMsg('msg-join');
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const name = document.getElementById('join-name').value.trim();
  const email = document.getElementById('join-email').value.trim();
  const password = document.getElementById('join-password').value;
  if (!code || !name || !email || !password) { showMsg('msg-join', 'Please fill in all fields.'); return; }
  if (password.length < 6) { showMsg('msg-join', 'Password must be at least 6 characters.'); return; }
  setLoading('btn-join', true);
  try {
    // Check the workspace exists
    const wsDoc = await getDoc(doc(db, 'workspaces', code));
    if (!wsDoc.exists()) {
      setLoading('btn-join', false);
      showMsg('msg-join', 'Workspace not found. Double-check the access code.');
      return;
    }
    // Create account for this team member
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    // Save workspace link — they share the owner's workspace
    localStorage.setItem('majc_workspace', JSON.stringify({
      wid: code,
      uname: name
    }));
    // onAuthStateChanged handles redirect
  } catch (e) {
    setLoading('btn-join', false);
    const msgs = {
      'auth/email-already-in-use': 'An account with this email already exists. Try logging in instead.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password must be at least 6 characters.'
    };
    showMsg('msg-join', msgs[e.code] || 'Could not join. Please try again.');
  }
};

// ── Allow pressing Enter to submit ───────────────────────────────────────────
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.signInEmail();
});
document.getElementById('signup-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.signUpEmail();
});
document.getElementById('join-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.joinTeam();
});
</script>

</body>
</html>
