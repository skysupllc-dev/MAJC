<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1a1814"/>
  
  <!-- Skid steer body -->
  <rect x="6" y="12" width="16" height="10" rx="1.5" fill="#b8722a"/>
  
  <!-- Cab -->
  <rect x="8" y="8" width="8" height="7" rx="1" fill="#b8722a"/>
  <!-- Cab window -->
  <rect x="9.5" y="9.5" width="5" height="4" rx="0.5" fill="#0a0f1a" opacity="0.7"/>

  <!-- Lift arm -->
  <rect x="15" y="7" width="2.5" height="10" rx="1" fill="#9a5e20" transform="rotate(-10 15 14)"/>

  <!-- Bucket -->
  <rect x="19" y="13" width="5" height="3.5" rx="1" fill="#9a5e20"/>
  <rect x="19" y="15.5" width="5" height="1.5" rx="0.5" fill="#7a4a18"/>

  <!-- Tracks -->
  <rect x="5" y="21" width="18" height="4" rx="2" fill="#3a3630"/>
  <!-- Track detail -->
  <rect x="6" y="22" width="16" height="2" rx="1" fill="#2a2620"/>
  <!-- Track wheels -->
  <circle cx="8" cy="23" r="1.5" fill="#4a4440"/>
  <circle cx="12" cy="23" r="1.5" fill="#4a4440"/>
  <circle cx="16" cy="23" r="1.5" fill="#4a4440"/>
  <circle cx="20" cy="23" r="1.5" fill="#4a4440"/>
</svg>
